            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            padding: 1rem 0.2rem;

        .chinese47 div {
            flex: 1 1 340px;
            position: sticky;
            top: 3%;
        }

        .chinese47 div img {

        }

            position: fixed;
            z-index: 1;

            right: 5%;
