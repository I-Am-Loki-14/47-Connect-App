<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application</title>
    <link rel="shortcut icon" href="./img/ico/47grouplogo.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap");

        * {
            padding: 0;
            margin: 0;
            list-style: none;
            box-sizing: border-box;
            text-decoration: none;
            scroll-behavior: smooth;

        }

        :root {
            --bg-color: #000000;
            --main-color: #ff9a00;
            --secondary-color: #ffd93d;
            --p-color: #fff;
            --h1-color: #ffff;
            --font-family: "Ubuntu", sans-serif;
            --font-weight: bold;
            --black-color: #000000;
            --white-color: #ffff;
            --para-color: rgb(181, 178, 178);
            --border-color: rgba(49, 49, 49, 0.808);
        }

        body {
            background-color: var(--bg-color);
        }

        .model {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .model div {
            /* background: pink; */
            flex: 0 1 500px;
            padding: 1.5rem;
        }

        .model_info {
            color: var(--para-color);
            font-family: var(--font-family);
            font-weight: var(--font-weight);
            display: flex;
            flex-direction: column;

        }

        .model_info p {
            margin: 1rem;
            font-size: 1rem;
        }

        .model_info p::first-letter {
            color: var(--main-color);
            font-weight: var(--font-weight);
            font-size: 1.5rem;

        }

        .promo-photo {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
            padding: 3rem;
        }

        .promo-photo img {
            flex: 0 1 250px;
        }
    </style>

</head>

<body>
    <header>
        <img src="./img/applicationBanner-3.jpg" alt="" style="width: 100%;object-fit: cover;object-position: center;">
    </header>
    <section class="model" id="model">
        <div data-aos="fade-up" data-aos-duration="500" data-aos-delay="500">
            <img src="./img/emodel-2-removebg-preview.png" alt="" style="width: 100%;">
        </div>
        <div class="model_info">
            <p data-aos="fade-up" data-aos-duration="500" data-aos-delay="500">Sign up today and get free 3,000 points
                to kickstart your dining journey.</p>
            <p data-aos="fade-up" data-aos-duration="600" data-aos-delay="500">Earn rewards effortlessly with every
                meal. Scan, collect points, and enjoy
                our card-less membership benefits.</p>
            <p data-aos="fade-up" data-aos-duration="700" data-aos-delay="500">Track your spending, unlock new
                levels, and indulge in up to 10%
                discounts at all outlets as our valued
                guest.</p>
        </div>
    </section>
    <section class="promo-photo" id="promo-photo">
        <img src="./img/webp/p01.webp" alt="" style="width: 100%;object-fit: cover;" data-aos="fade-up"
            data-aos-duration="500" data-aos-delay="500">
        <img src="./img/p02.png" alt="" style="width: 100%;object-fit: cover;" data-aos="fade-up"
            data-aos-duration="500" data-aos-delay="500">
        <img src="./img/p03.png" alt="" style="width: 100%;object-fit: cover;" data-aos="fade-up"
            data-aos-duration="500" data-aos-delay="500">
        <img src="./img/p04.png" alt="" style="width: 100%;object-fit: cover;" data-aos="fade-up"
            data-aos-duration="500" data-aos-delay="500">
        <img src="./img/p05.png" alt="" style="width: 100%;object-fit: cover;" data-aos="fade-up"
            data-aos-duration="500" data-aos-delay="500">
    </section>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>

</html>
