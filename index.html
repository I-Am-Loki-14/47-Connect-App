<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>47 Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/media.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <!-- nav_section start  -->
    <div class="hero-container">
        <div class="hero">
            <img src="./img/47grouplogo.png" alt="gp_logo" style="width: 28px;height: 28px;">

        </div>
        <div>
            <i class="fa-regular fa-bell" style="color: rgb(254, 254, 254);font-size: 1.2rem;"></i>
        </div>
    </div>


    <nav class="nav-links" id="nav-links">
        <div id="home"><i class="fa-regular fa-house" style="color: rgb(254, 254, 254);"></i><a href="">Home</a></div>
        <div id="mycard"><i class="fa-solid fa-address-card" style="color: rgb(254, 254, 254);"></i><a href="">My
                Card</a></div>
        <div id="branches"><i class="fa-solid fa-globe" style="color: rgb(254, 254, 254);"></i><a href="">Branches</a>
        </div>
        <div id="profile"><i class="fa-regular fa-user" style="color: rgb(254, 254, 254);"></i><a href="">Profile</a>
        </div>
    </nav>
    <!-- nav_section end  -->


    <!-- promotion carousel  -->
    <section class="promotion" id="promotion">
        <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner" style="height: 550px;padding: 0.2rem;">

                <div class="carousel-item active" style="width: 100%;height: 100%;">
                    <img src="./img/pexels-pixabay-262978.jpg" class="d-block " alt=""
                        style="width: 100%;height: 100% !important;">
                </div>
                <div class="carousel-item active" style="width: 100%;height: 100%;">
                    <img src="./img/pexels-pok-rie-33563-268261.jpg" class="d-block " alt=""
                        style="width: 100%;height: 100% !important;">
                </div>
                <div class="carousel-item active" style="width: 100%;height: 100%;">
                    <img src="./img/pexels-chevanon-302901.jpg" class="d-block " alt=""
                        style="width: 100%;height: 100% !important;">
                </div>

            </div>
        </div>
        <!-- links start  -->
        <section class="link-section" id="link-section">
            <div class="link_container" id="link_container">
                <div><a href=""><i class="fa-solid fa-book" style="color: #ff9a00;margin: 0 0.5rem;"></i>About Us</a>
                </div>
                <div><a href=""><i class="fa-regular fa-image" style="color: #ff9a00;margin: 0 0.5rem;"></i>Menus</a>
                </div>
                <div><a href=""><i class="fa-regular fa-image" style="color: #ff9a00;margin: 0 0.5rem;"></i>Gallery</a>
                </div>
                <div><a href=""><i class="fa-solid fa-utensils"
                            style="color: #ff9a00;margin: 0 0.5rem;"></i>Catering</a></div>
            </div>
        </section>
        <!-- link end -->
    </section>
    <!-- promotion carousel  -->

</body>

</html>
